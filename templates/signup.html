<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buddy AI - Sign Up</title>
    
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo-container">
                <img src="{{ url_for('static', filename='buddy_robot.png') }}" alt="Buddy AI">
            </div>
            
            <h2 style="color: white; margin-bottom: 8px; font-weight: 700;">Create Account</h2>
            <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 25px;">Start your journey with <span style="color: var(--accent); font-weight: 600;">Buddy AI</span></p>
            
            <form action="/signup" method="POST">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" placeholder="Choose Username" required autocomplete="off">
                </div>

                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="text" name="contact" id="contact" placeholder="Email or Mobile" required autocomplete="off">
                    <button type="button" class="otp-btn" onclick="triggerOTP()">Send OTP</button>
                </div>

                <div id="otp-section" style="display: none; animation: fadeIn 0.4s ease-out;">
                    <div class="input-group" style="border-color: var(--accent);">
                        <i class="fas fa-key" style="color: var(--accent);"></i>
                        <input type="text" name="otp" placeholder="Enter 4-Digit OTP" maxlength="4" style="text-align: center; letter-spacing: 5px; font-weight: bold; color: var(--accent);">
                    </div>
                    <p id="otp-msg" style="color: #4ade80; font-size: 11px; margin-bottom: 15px;"></p>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" id="password" placeholder="Set Password" required>
                    <i class="fas fa-eye" onclick="togglePassword()" style="cursor: pointer; color: var(--text-muted); transition: 0.3s;" onmouseover="this.style.color='white'" onmouseout="this.style.color='var(--text-muted)'"></i>
                </div>

                <button type="submit" class="primary-btn" style="margin-top: 5px;">Sign Up</button>
            </form>

            <div class="divider">OR SIGN UP WITH</div>

            <div class="social-grid">
                <a href="/auth/google" class="social-btn"><i class="fab fa-google" style="color: #ea4335;"></i></a>
                <a href="/auth/apple" class="social-btn"><i class="fab fa-apple" style="color: #ffffff;"></i></a>
                <a href="/auth/windows" class="social-btn"><i class="fab fa-windows" style="color: #00a4ef;"></i></a>
            </div>

            <div style="color: var(--text-muted); font-size: 14px;">
                Already have an account? 
                <a href="/login" style="color: var(--accent); text-decoration: none; font-weight: 600;">Login</a>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            const p = document.getElementById('password');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        function triggerOTP() {
            const contact = document.getElementById('contact').value.trim();
            if(!contact) {
                alert("Macha, Email or Mobile number enter pannu first.");
                return;
            }
            
            document.getElementById('otp-section').style.display = 'block';
            document.getElementById('otp-msg').innerText = "OTP sent to " + contact + " successfully!";
        }
    </script>
</body>
</html>
